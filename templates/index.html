<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG Document Q&A</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Document Q&amp;A</h2>
      <p class="subtitle">Powered by RAG + Groq</p>
    </div>

    <!-- Upload -->
    <div class="upload-section">
      <div class="drop-zone" id="dropZone">
        <div class="drop-icon">📄</div>
        <p>Drop PDF here or <label class="browse-link" for="fileInput">browse</label></p>
        <input type="file" id="fileInput" accept=".pdf" hidden>
        <p class="drop-hint">PDF · up to 50 MB</p>
      </div>
      <div id="uploadProgress" class="upload-progress hidden">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <p id="uploadStatus">Processing…</p>
      </div>
      <div id="uploadSummary" class="upload-summary hidden">
        <span class="summary-label">Summary</span>
        <p id="summaryText"></p>
      </div>
    </div>

    <!-- Model -->
    <div class="model-section">
      <label for="modelSelect">Model</label>
      <select id="modelSelect">
        <option value="llama3.1-8b">Llama 3.1 8B — Fast</option>
      </select>
    </div>

    <!-- Document filter -->
    <div class="filter-section">
      <label for="docFilter">Search in</label>
      <select id="docFilter">
        <option value="">All documents</option>
      </select>
    </div>

    <!-- Document list -->
    <div class="docs-section">
      <h3>Indexed Documents</h3>
      <div id="documentList" class="document-list">
        <p class="empty-state">No documents uploaded yet</p>
      </div>
    </div>
  </aside>

  <!-- Chat -->
  <main class="chat-area">
    <div class="chat-header">
      <h3>Ask a Question</h3>
      <div class="header-actions">
        <span id="docCount" class="doc-badge">0 docs indexed</span>
        <button class="header-btn" onclick="exportChat()" title="Export chat as Markdown">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Export
        </button>
        <button class="header-btn new-chat-btn" onclick="newConversation()" title="Start a new conversation">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          New Chat
        </button>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="welcome-message">
        <div class="welcome-icon">🔍</div>
        <h3>Ready to answer questions</h3>
        <p>Upload PDF documents on the left, then ask anything about their content.</p>
      </div>
    </div>

    <div class="chat-input-area">
      <textarea id="questionInput" placeholder="Ask a question… (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
      <button id="askBtn" onclick="askQuestion()" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </main>

</div>
<script src="/static/app.js"></script>
</body>
</html>
