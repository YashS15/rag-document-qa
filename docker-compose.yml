version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    volumes:
      - vectorstore_data:/app/vectorstore
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  vectorstore_data:
  ollama_data:
